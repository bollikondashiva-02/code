<!DOCTYPE html>
<html>
<head>
  <title>Table using Rowspan and Colspan</title>
</head>
<body>

<table border="1" cellspacing="0" cellpadding="8">

  <!-- Top nested section -->
  <tr>
    <td rowspan="10">A</td>
    <td rowspan="9">B</td>
    <td rowspan="8">C</td>
    <td rowspan="7">D</td>
    <td rowspan="6">E</td>
    <td rowspan="5">F</td>
    <td colspan="3">AH</td>
    <td rowspan="5">I</td>
    <td rowspan="6">J</td>
    <td rowspan="7">K</td>
    <td rowspan="8">L</td>
    <td rowspan="9">M</td>
  </tr>

  <tr>
    <td colspan="3">H</td>
  </tr>

  <tr>
    <td colspan="3">GH</td>
  </tr>

  <tr>
    <td colspan="3">N</td>
  </tr>

  <tr>
    <td colspan="5">O</td>
  </tr>

  <tr>
    <td colspan="7">P</td>
  </tr>

  <tr>
    <td colspan="9">Q</td>
  </tr>

  <!-- Middle row -->
  <tr>
    <td>R</td>
    <td>S</td>
    <td>T</td>
    <td>U</td>
    <td>V</td>
    <td>W</td>
    <td>X</td>
  </tr>

  <!-- Y row -->
  <tr>
    <td colspan="13">Y</td>
  </tr>

  <!-- Bottom row -->
  <tr>
    <td>Z</td>
    <td>1</td>
    <td>2</td>
    <td>3</td>
    <td>4</td>
    <td>5</td>
    <td>6</td>
    <td>7</td>
    <td>8</td>
    <td>9</td>
    <td colspan="2">10</td>
  </tr>

</table>

</body>
</html>
